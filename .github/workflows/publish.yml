name: Publish to npm

on:
  release:
    types: [published]

jobs:
  # ── Sanity check: run full test suite before publishing ──────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Publish @cast-builder/core ───────────────────────────────────────────────
  publish-core:
    name: Publish @cast-builder/core
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js with npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set version from release tag
        # Release tags must be in the form v1.2.3 — the leading "v" is stripped.
        # This updates package.json in-place without committing back to git.
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version
        working-directory: packages/core

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Publish @cast-builder/core
        run: npm publish --provenance --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish @cast-builder/cli ─────────────────────────────────────────────────
  publish-cli:
    name: Publish @cast-builder/cli
    runs-on: ubuntu-latest
    needs: publish-core   # must publish core first so CLI's dep resolves
    permissions:
      contents: read
      id-token: write   # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js with npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Set version from release tag
        # Set the same version on the CLI package and pin the core dependency
        # to the exact version just published.
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version
          npm pkg set "dependencies.@cast-builder/core=$VERSION"
        working-directory: packages/cli

      - name: Build (core then cli)
        run: npm run build

      - name: Publish @cast-builder/cli
        run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
